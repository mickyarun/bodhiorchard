server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Without this + runtime-resolved upstreams
    # below, nginx caches the backend/multiplayer IPs at startup — so
    # `docker compose up --force-recreate backend` (which gives the
    # backend a new IP) strands nginx talking to the old IP (often
    # reassigned to another container), manifesting as 502 "Connection
    # refused" until nginx is reloaded. `valid=10s` is short enough to
    # pick up container restarts quickly without DNS pressure.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API proxy. The `set $backend_upstream ...` trick forces nginx to
    # resolve the hostname per-request using the resolver above instead
    # of caching it forever at config load.
    location /api/ {
        set $backend_upstream "backend";
        proxy_pass http://$backend_upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Colyseus multiplayer — HTTP matchmaking (POST /matchmake/joinOrCreate/*)
    # and the WebSocket upgrade. Path is /colyseus/ in both Hybrid (Vite dev
    # proxy in vite.config.ts) and Full Docker (this block) so the client's
    # resolveColyseusUrl() doesn't need to branch on environment.
    #
    # Note: with a variable in proxy_pass (needed for runtime DNS — see
    # resolver above) nginx does NOT do its usual location-prefix strip.
    # We `rewrite` the /colyseus/ prefix off explicitly so Colyseus sees
    # the URIs it expects (/matchmake/..., /matchmake/joinOrCreate/..., etc.).
    location /colyseus/ {
        set $multiplayer_upstream "multiplayer";
        rewrite ^/colyseus/(.*)$ /$1 break;
        proxy_pass http://$multiplayer_upstream:2567;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
