# Production deployment — all secrets from .env, TLS via Caddy.
#
# Usage:
#   cp .env.production.example .env.production
#   nano .env.production          # fill in domain + secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bodhiorchard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-bodhiorchard}"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bodhiorchard}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      EMBEDDING_PROVIDER: fastembed
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      EMBEDDING_DIMENSIONS: "384"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
      LLM_PREMIUM_MODEL: ${LLM_PREMIUM_MODEL:-claude-sonnet-4-6}
      COLYSEUS_URL: http://multiplayer:2567
      COLYSEUS_BRIDGE_SECRET: ${COLYSEUS_BRIDGE_SECRET}
      PUBLIC_URL: ${PUBLIC_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ENV: production
      GITHUB_PAT: ${GITHUB_PAT:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - repos_data:/data/repos
      - ssh_data:/data/ssh
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  multiplayer:
    build:
      context: .
      dockerfile: multiplayer/Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
      COLYSEUS_BRIDGE_SECRET: ${COLYSEUS_BRIDGE_SECRET}
      NODE_ENV: production
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
      - multiplayer
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  repos_data:
  ssh_data:
  caddy_data:
  caddy_config:
