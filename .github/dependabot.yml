version: 2
updates:
  # Backend Python deps (pyproject.toml + alembic.ini location)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Root npm workspace (drives frontend + multiplayer indirectly)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      js-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Frontend workspace (explicit so workspace-only deps surface)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Multiplayer workspace
  - package-ecosystem: "npm"
    directory: "/multiplayer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "multiplayer"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      multiplayer-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions pinning
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # Docker base images (compose + Dockerfiles)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
