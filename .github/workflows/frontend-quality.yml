name: Frontend quality

on:
  # NO ``paths:`` filter — every required status check below is gated by
  # the branch protection ruleset, and GitHub holds a required check in
  # "Expected" forever if its workflow doesn't run at all. Always trigger
  # on every PR so the checks always report; npm ci is cheap and the
  # type-check / test runs are fast when nothing in frontend/ changed.
  pull_request:
  push:
    branches: [main]

jobs:
  frontend-typecheck:
    name: vue-tsc (frontend type-check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install workspace deps
        run: npm ci

      - name: Type-check frontend
        run: npx --workspace bodhiorchard-frontend vue-tsc --noEmit

  frontend-tests:
    name: vitest (frontend tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install workspace deps
        run: npm ci

      - name: Run frontend tests
        run: npm --workspace bodhiorchard-frontend test

  multiplayer-build:
    name: tsc (multiplayer build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install workspace deps
        run: npm ci

      - name: Build multiplayer
        run: npm --workspace bodhiorchard-multiplayer run build

  multiplayer-tests:
    name: jest (multiplayer tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install workspace deps
        run: npm ci

      - name: Run multiplayer tests
        run: npm --workspace bodhiorchard-multiplayer test
