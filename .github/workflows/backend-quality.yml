name: Backend quality

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-quality.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-quality.yml"

jobs:
  mypy:
    name: mypy --strict (blocks merge)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy app/

  ruff:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check app/

      - name: ruff format --check
        run: ruff format --check app/

  pytest:
    name: pytest (backend tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bodhiorchard
          POSTGRES_PASSWORD: bodhiorchard
          POSTGRES_DB: bodhiorchard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bodhiorchard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+asyncpg://bodhiorchard:bodhiorchard@localhost:5432/bodhiorchard_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-secret-not-for-prod
      ENCRYPTION_KEY: ci-encryption-key-not-for-prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q --maxfail=10
