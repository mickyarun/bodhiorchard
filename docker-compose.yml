# Full-stack compose for the evaluator path: `docker compose up`.
# Starts postgres, redis, backend (with migrations), multiplayer, and frontend.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bodhiorchard
      POSTGRES_PASSWORD: bodhiorchard
      POSTGRES_DB: bodhiorchard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Host-side port for DBeaver / psql etc.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bodhiorchard -d bodhiorchard"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://bodhiorchard:bodhiorchard@postgres:5432/bodhiorchard
      REDIS_URL: redis://redis:6379
      SECRET_KEY: change-me-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      EMBEDDING_PROVIDER: fastembed
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      EMBEDDING_DIMENSIONS: "384"
      # Optional: pass a host-level Anthropic key through to the container.
      # When unset this is empty; orgs using api_key auth mode override it
      # from the encrypted value stored in the DB.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # LLM provider — defaults to anthropic; override via root .env if needed
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
      LLM_PREMIUM_MODEL: ${LLM_PREMIUM_MODEL:-claude-sonnet-4-6}
      # Colyseus internal URL — must use service name, not localhost
      COLYSEUS_URL: http://multiplayer:2567
      # Shared HMAC with the multiplayer service — both sides must match or
      # internal bridge calls (verify-token, org-snapshot, race-*) get 403.
      COLYSEUS_BRIDGE_SECRET: ${COLYSEUS_BRIDGE_SECRET:-dev-colyseus-bridge-secret}
      # Inside Docker the multiplayer server is reachable at its service
      # name. Without this, settings.colyseus.url defaults to
      # http://localhost:2567 which resolves to the backend container
      # itself, silently dropping every agent_activity fan-out POST.
      COLYSEUS_URL: http://multiplayer:2567
    ports:
      - "8000:8000"
    volumes:
      # Persistent home for git clones of target repositories (Full Docker
      # mode). Survives rebuilds so scans don't re-clone every time.
      - repos_data:/data/repos
      # Persistent store for the backend's ed25519 deploy keypair used to
      # clone private GitHub repos. Only the public key is ever exposed.
      - ssh_data:/data/ssh
    # Phase D Layer 6 hardening — defense in depth around the ``claude``
    # subprocess. To enable the egress firewall on a Linux host:
    #
    # 1. Uncomment the cap_drop / cap_add / tmpfs blocks below.
    # 2. Set ``BODHIORCHARD_EGRESS_FIREWALL=1`` in the compose env so
    #    entrypoint.sh runs ``backend/docker/init-firewall.sh`` before
    #    starting uvicorn.
    # 3. The firewall allow-lists ``api.anthropic.com``,
    #    ``api.github.com``, ``registry.npmjs.org``, ``pypi.org``, etc.
    #    Any other outbound TCP gets DROP'd at the netfilter layer.
    #
    # Left as opt-in because (a) Docker Desktop for Mac does not surface
    # NET_ADMIN reliably and (b) iptables-on-podman / k3s has different
    # plumbing. Production Linux hosts: turn it on.
    #
    # cap_drop:
    #   - ALL
    # cap_add:
    #   - NET_ADMIN           # required for the firewall init
    #   - CHOWN               # for uvicorn / pip / alembic to write logs
    #   - DAC_OVERRIDE
    #   - FOWNER
    #   - SETUID
    #   - SETGID
    #   - KILL                # graceful shutdown
    # tmpfs:
    #   - /tmp:rw,size=128M,mode=1777    # MCP tokens land here; wiped on stop
    # environment:
    #   BODHIORCHARD_EGRESS_FIREWALL: "1"

  multiplayer:
    build:
      context: .
      dockerfile: multiplayer/Dockerfile
    depends_on:
      # Multiplayer's onAuth calls backend /api/v1/internal/colyseus/verify-token
      # on every join. Starting before the backend is up would reject early
      # joins with "auth backend unreachable".
      - backend
    environment:
      # Inside Docker the backend is reachable at its service name, not
      # localhost — BackendClient.ts defaults to http://localhost:8000 which
      # resolves to this container itself.
      BACKEND_URL: http://backend:8000
      # Shared HMAC for internal bridge calls. Pinned to the same default on
      # both sides so they can't drift silently; override in production via
      # a host env var and the backend's COLYSEUS_BRIDGE_SECRET will see it
      # too (they share the key).
      COLYSEUS_BRIDGE_SECRET: ${COLYSEUS_BRIDGE_SECRET:-dev-colyseus-bridge-secret}
    ports:
      - "2567:2567"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
      - multiplayer
    ports:
      - "3000:80"

volumes:
  postgres_data:
  repos_data:
  ssh_data:
