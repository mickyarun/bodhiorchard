# Infra-only compose for contributors running the app natively with hot-reload.
# Starts postgres (with pgvector) + redis. Use `docker-compose.yml` for the full stack.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bodhiorchard-postgres
    environment:
      POSTGRES_USER: bodhiorchard
      POSTGRES_PASSWORD: bodhiorchard
      POSTGRES_DB: bodhiorchard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bodhiorchard -d bodhiorchard"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: bodhiorchard-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
